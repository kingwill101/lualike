name: example_flutter_bytecode
description: >
  Flutter example: CompileMode.bytecode
  Lua → bytecode at build time, loaded from assets at runtime.
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.7.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  lualike:
    path: ../../../lualike
  flutter_lualike:
    path: ../../../flutter_lualike

dependency_overrides:
  lualike:
    path: ../../../lualike
  lualike_ffi:
    path: ../../../lualike_ffi
  lualike_hooks:
    path: ../../

dev_dependencies:
  hooks: ^2.0.2
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - build/lua/
