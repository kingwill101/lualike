name: lualike_hooks_example_dart_data_assets
description: Dart CLI app using lualike_hooks with experimental data assets.
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.14.0-0 <4.0.0"

dependencies:
  lualike:
    path: ../../../lualike

dependency_overrides:
  lualike:
    path: ../../../lualike
  lualike_ffi:
    path: ../../../lualike_ffi

dev_dependencies:
  data_assets: ^0.20.0
  lualike_hooks:
    path: ../../
  hooks: ^2.0.2
  lints: ^5.0.0
  test: ^1.24.0
