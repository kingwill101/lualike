name: lualike_hooks
description: Build hook for compiling Lua scripts to bytecode and bundling as data assets in Flutter apps.
resolution: workspace
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.7.0

dependencies:
  data_assets: ^0.20.0
  hooks: ^2.0.2
  lualike:
    path: ../lualike

dev_dependencies:
  lints: ^6.1.0
  test: ^1.24.0

flutter:
  assets:
    - assets/
