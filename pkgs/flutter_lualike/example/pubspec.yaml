name: flutter_lualike_example
description: Example Flutter app using flutter_lualike with build hooks.
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.7.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_lualike:
    path: ../

dependency_overrides:
  lualike:
    path: ../../lualike
  lualike_hooks:
    path: ../../lualike_hooks

dev_dependencies:
  hooks: ^2.0.2
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - build/lua/
