name: flutter_lualike
description: >
    Flutter integration for lualike. Provides AssetBundle filesystem backend,
    build hook for compiling Lua scripts, and convenience APIs for running
    Lua in Flutter apps.
version: 0.2.1
resolution: workspace
repository: https://github.com/kingwill101/lualike
topics:
  - lua
  - scripting
  - flutter
  - asset-bundle
  - build-hook

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  lualike: ^0.4.0
  lualike_hooks: ^0.1.0
  hooks: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^6.1.0
