name: love2d
description: Workspace scaffold for LOVE 2D related Dart bindings and helpers.
version: 0.1.0
publish_to: none
resolution: workspace
repository: https://github.com/kingwill101/lualike

environment:
  sdk: ^3.9.0
  flutter: ">=3.35.0"

dependencies:
  archive: ^4.0.9
  audioplayers: ^6.6.0
  build: ^4.0.5
  crypto: ^3.0.6
  flame: ^1.37.0
  flame_forge2d: ^0.19.2+6
  flutter:
    sdk: flutter
  image: ^4.8.0
  lualike: any
  path: ^1.9.1
  path_provider: ^2.1.5
  path_provider_platform_interface: ^2.1.2
  vector_math: ^2.2.0

dev_dependencies:
  build_runner: ^2.13.1
  flame_test: ^2.2.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  assets:
    - third_party/love/extra/resources/Vera.ttf
  shaders:
    - test_assets/shaders/runtime_effect_solid_color.frag
    - test_assets/shaders/runtime_effect_uniform_texture.frag
