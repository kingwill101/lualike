name: file_lualike
description: >
    Adapter that bridges package:file FileSystem implementations (SFTP, memory,
    local) into the lualike scripting runtime. Enables transparent filesystem
    backends for io.open(), os.remove(), dofile(), and all other lualike
    file operations.
version: 0.1.1
resolution: workspace
repository: https://github.com/kingwill101/lualike
topics:
  - lua
  - scripting
  - filesystem
  - sftp
  - adapter

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  file: ^7.0.1
  lualike: ^0.2.4

dev_dependencies:
  lints: ^6.1.0
  test:
  file_sftp: ^0.2.1
  dartssh2: ^2.18.0
  testcontainers_compose: ^1.0.0
