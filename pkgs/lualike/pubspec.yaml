name: lualike
description: >
    A Lua-like scripting language for Dart, designed to be easy to embed and extend.
    It provides a simple REPL, supports Lua-like syntax, and allows for seamless integration with Dart code.
version: 0.1.0
resolution: workspace
repository: https://github.com/kingwill101/lualike
topics:
  - lua
  - scripting
  - interop
  - interpreter
  - repl

environment:
  sdk: ">=3.9.0 <4.0.0"

# Add regular dependencies here.
dependencies:
  args: ^2.7.0
  characters: ^1.4.1
  source_span: ^1.10.2
  crypto: ^3.0.7
  meta: ^1.17.0
  pointycastle: ^4.0.0

  path: ^1.9.1
  archive: ^4.0.9
  http: ^1.6.0
  yaml: ^3.1.3
  dart_console: ^4.1.2
  glob: ^2.1.3
  convert: ^3.1.2
  collection: ^1.19.1
  petitparser: ^7.0.2
  xrandom: ^0.7.2
  artisanal: ^0.2.0+1
  web: ^1.1.1
  contextual: ^2.2.0

dev_dependencies:
  lints: ^6.1.0
  test:
  build_runner: ^2.12.2
  build_web_compilers: ^4.4.15
  lualike_test:
    path: ../test

funding:
  - https://www.buymeacoffee.com/kingwill101

executables:
    lualike: "main"
