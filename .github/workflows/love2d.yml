name: Flutter packages

on:
  push:
    branches: ["master"]
    paths:
      - "pkgs/love2d/**"
      - "pkgs/flutter_lualike/**"
      - "pkgs/lualike/**"
      - ".github/workflows/love2d.yml"
  pull_request:
    paths:
      - "pkgs/love2d/**"
      - "pkgs/flutter_lualike/**"
      - "pkgs/lualike/**"
      - ".github/workflows/love2d.yml"

defaults:
  run:
    working-directory: pkgs/love2d

jobs:
  flutter-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        channel: [stable]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.channel }}

      - name: Install dependencies
        run: flutter pub get

      - run: dart format --output=none --set-exit-if-changed .

      - run: flutter analyze

      - name: Run tests (love2d)
        run: flutter test

      - name: Run tests (flutter_lualike)
        run: flutter test
        working-directory: pkgs/flutter_lualike

  # Master-channel job for the experimental GPU backend.
  # Only runs on push to master (not PR) since it's experimental.
  gpu-backend:
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: master

      - name: Install dependencies (love2d_gpu)
        run: flutter pub get
        working-directory: pkgs/love2d_gpu

      - name: Analyze (love2d_gpu)
        run: flutter analyze
        working-directory: pkgs/love2d_gpu
